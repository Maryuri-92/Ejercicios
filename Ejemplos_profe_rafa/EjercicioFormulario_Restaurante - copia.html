<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Ejercicio Formulario</title>
    <style>
        .seccionComida {
            border: solid 2px gray;
            margin: 10px;
            padding: 15px;
        }

        .seccionComida ul {
            list-style-type: none;
        }

        .centrado {
            text-align: center;
        }

        strong {
            color: blue;
        }
    </style>
</head>

<body>
    <header>
        <h1>Selecciona tu menú</h1>
    </header>
    <form action="">
        <section id="seccionPrimerPlato" class="seccionComida">
            <h3>Primer plato</h3>
            <ul>
                <li><input type="radio" name="primerPlato" value="10" onclick="eleccion(this);">Sopa <strong> 10€
                    </strong></li>
                <li><input type="radio" name="primerPlato" value="9.50" onclick="eleccion(this);">Caldo
                    <strong>9.50€</strong></li>
                <li><input type="radio" name="primerPlato" value="13" onclick="eleccion(this);">Consomé
                    <strong>13€</strong></li>
            </ul>
        </section>
        <section id="seccionSegundoPlato" class="seccionComida">
            <h3>Segundo plato</h3>
            <ul>
                <li><input type="radio" name="segundoPlato" value="13" onclick="eleccion(this);">Carne
                    <strong>13€</strong>
                </li>
                <li><input type="radio" name="segundoPlato" value="18.20" onclick="eleccion(this);">Pescado
                    <strong>18.20€</strong>
                </li>
                <li><input type="radio" name="segundoPlato" value="7" onclick="eleccion(this);">Pasta
                    <strong>7€</strong>
                </li>
            </ul>
        </section>
        <section id="seccionPostre" class="seccionComida">
            <h3>Postre</h3>
            <ul>
                <li><input type="radio" name="postre" value="3.51" onclick="eleccion(this);">Flan <strong>3.51€</strong>
                </li>
                <li><input type="radio" name="postre" value="7.90" onclick="eleccion(this);">Tarta <strong>7.90€
                    </strong></li>
                <li><input type="radio" name="postre" value="5" onclick="eleccion(this);">Yogur <strong>5€</strong></li>
            </ul>
        </section>
        <section id="seccionDatos" class="centrado">
            Nombre: <input type="text" name="nombreCliente" required>
            Dirección: <input type="text" name="direccionCliente">
            Forma de pago:
            <select name="formaPago">
                <option value="tarjeta">Con tarjeta de crédito</option>
                <option value="efectivo">En efectivo</option>
                <option value="bizum">Por Bizum</option>
            </select>
            Importe Total: <span id="total" style="color: blue; font-size: large;"></span>€
        </section>
        <p class="centrado">
            <input type="submit" value="Hacer reserva">
            <input type="button" value="Calcular total con querySelector" onclick="calcularTotal3();">
        </p>
    </form>
    <script src="EjercicioFormulario_Restaurante.js"></script>
</body>

</html>
