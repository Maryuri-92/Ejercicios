<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrusel</title>
    <style>
        body {
            margin: 0;
            height: 100vh; /* el 100% del viewport height */
            display: flex;
            align-items: center;
        }
        .contenedorCarrusel {
            width: 50vw;
            display: grid;
            grid-template-columns: 1fr 3fr 1fr;
            margin: auto;
            align-items: center;
        }
        .contenedorCarrusel img {
            width: 100%;
        }
        .flecha:active {
            transform: scale(90%);
        }
    </style>
</head>
<body id="cuerpo">
    
    <section class="contenedorCarrusel">
        <img src="imagenesCarrusel/flechaIzquierda.jpg" alt="Flecha hacia la izquierda" onclick="moverIzquierda();" class="flecha" id="flechaIzq">
        <img src="imagenesCarrusel/Halcon.jpg" alt="Halcón Milenario" id="imagenCarrusel">
        <img src="imagenesCarrusel/flechaDerecha.jpg" alt="Flecha hacia la derecha" onclick="moverDerecha();" class="flecha">
    </section>

    <script src="carrusel.js"></script>
</body>
</html>
