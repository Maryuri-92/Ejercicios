<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de monedas</title>
    <style>
        ul {
            list-style-type: none;
        }
    </style>
</head>
<body>
    Introduce en importe en euros: <input type="number" id="txtEuros" step="0.01">€
    <fieldset>
        <legend>Tipo de conversión</legend>
        <ul>
            <li><input type="radio" name="moneda" id="rdDolar" value="1.18" data-simbolo="&#036;">A dolares</li>
            <li><input type="radio" name="moneda" id="rdLibra" value="0.86" data-simbolo="&#163;">A libras</li>
            <li><input type="radio" name="moneda" id="rdYen" value="183.82" data-simbolo="&#165;">A yenes</li>
        </ul>
    </fieldset>
    <input type="button" value="Convertir" onclick="convertir();">
    <div id="divResultado"></div>
    <script src="conversorMonedas.js"></script>
</body>
</html>
