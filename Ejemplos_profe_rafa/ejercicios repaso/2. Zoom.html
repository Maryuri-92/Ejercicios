<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zoom</title>
    <style>
        img {
            width: 400px; /*El mismo que el value del range*/
        }
    </style>
</head>
<body>
    <div>
        <input type="range" id="rngZoom" min="400" max="1200" value="400" oninput="zoom();">
    </div>
    <img src="perro.jpg" id="imagenPerro" alt="Un perro">

    <script src="2. Zoom.js"></script>
</body>
</html>
