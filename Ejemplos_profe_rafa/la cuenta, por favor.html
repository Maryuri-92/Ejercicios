<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio Formulario</title>
    <style>
        .contenedorMenu {
            display: flex;
        }
        .seccionComida {
            border: solid 2px gray;
            margin: 10px;
            padding: 15px;
            width: 33%;
        }
        .seccionComida ul {
            list-style-type: none;
        }
        .centrado {
            text-align: center;
        }
    </style>
</head>
<body>
    <header>
        <h1>Selecciona tu menú</h1>
    </header>
    <form action="">
        <div class="contenedorMenu">
            <section id="seccionPrimerPlato" class="seccionComida">
                <h3>Primer plato</h3>
                <ul>
                    <li><input type="radio" name="primerPlato" value="10" onclick="calcularTotal(this)" id="radioSopa">Sopa - 10€</li>
                    <li><input type="radio" name="primerPlato" value="9.90" onclick="calcularTotal(this)">Caldo - 9.90€</li>
                    <li><input type="radio" name="primerPlato" value="5" onclick="calcularTotal(this)">Consomé - 5€</li>
                </ul>
            </section>
            <section id="seccionSegundoPlato" class="seccionComida">
                <h3>Segundo plato</h3>
                <ul>
                    <li><input type="radio" name="segundoPlato" value="15.45" onclick="calcularTotal(this)">Carne - 15.45€</li>
                    <li><input type="radio" name="segundoPlato" value="18.60" onclick="calcularTotal(this)">Pescado - 18.60€</li>
                    <li><input type="radio" name="segundoPlato" value="7" onclick="calcularTotal(this)">Pasta - 7€</li>
                </ul>
            </section>
            <section id="seccionPostre" class="seccionComida">
                <h3>Postre</h3>
                <ul>
                    <li><input type="radio" name="postre" value="3.51" onclick="calcularTotal(this)">Flan - 3.51€</li>
                    <li><input type="radio" name="postre" value="7.90" onclick="calcularTotal(this)">Tarta - 7.90€</li>
                    <li><input type="radio" name="postre" value="2" onclick="calcularTotal(this)">Yogur - 2€</li>
                </ul>
            </section>
        </div>
        <section id="seccionDatos" class="centrado">
            Nombre: <input type="text" name="nombreCliente" required>
            Dirección: <input type="text" name="direccionCliente">
            Forma de pago:
            <select name="formaPago">
                <option value="tarjeta">Con tarjeta de crédito</option>
                <option value="efectivo">En efectivo</option>
                <option value="bizum">Por Bizum</option>
            </select>
            Importe total: <span id="importeTotal">0</span>€
        </section>
        <p class="centrado">
            <input type="submit" value="Hacer reserva">
            <input type="button" value="Calcular total con querySelector" onclick="calcularTotal3();">
        </p>
    </form>

    <script src="la cuenta, por favor.js"></script>
</body>
</html>
