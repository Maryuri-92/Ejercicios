<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista doble</title>
    <style>
        body {
            display: flex;
            justify-content: center;
        }
    </style>
</head>
<body>
    <select id="listaIzquierda" size="6">
        <option value="1">Opcion 1</option>
        <option value="2">Opcion 2</option>
        <option value="3">Opcion 3</option>
        <option value="4">Opcion 4</option>
        <option value="5">Opcion 5</option>
        <option value="6">Opcion 6</option>
    </select>
    <div>
        <input type="button" value=">" onclick="pasarUno('listaIzquierda', 'listaDerecha');">
        <input type="button" value=">>" onclick="pasarTodos('listaIzquierda', 'listaDerecha');">
        <input type="button" value="<" onclick="pasarUno('listaDerecha', 'listaIzquierda');">
        <input type="button" value="<<" onclick="pasarTodos('listaDerecha', 'listaIzquierda');">
    </div>
    <select id="listaDerecha" size="6"></select>

    <script src="listaDoble2.js"></script>
</body>
</html>
