<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mostrar y ocultar</title>
    <style>
        .oculto {
            display: none;
        }
        .visible {
            display: block;
        }
    </style>
</head>
<body>

    <input id="boton" type="button" value="Mostrar" onclick="mostrarOcultar();">
    <p id="parrafoOculto" class="oculto">Este texto está oculto</p>
    <p>Este párrafo está visible</p>

    <script src="mostrarOcultar.js"></script>
</body>
</html>
