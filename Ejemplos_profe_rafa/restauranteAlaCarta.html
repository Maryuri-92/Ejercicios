<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurante</title>
    <link rel="stylesheet" href="restauranteAlaCarta.css">
</head>

<body>
    <header>
        <h1>𓌉◯𓇋 Restaurante A La Carta 𓌉◯𓇋</h1>
    </header>
    <section id="contenedor">
        <div>
            <h3>
                <nav><a href="">ENVIO A DOMICILIO</a></nav>
            </h3>
        </div>
        <div>
            <h3>
                <nav><a href="">Realiza Tus Reservas</a></nav>
            </h3>
        </div>
        <div id="menu">
            <h3>Crea Tu Menú:</h3>
            <p>(Maximo 2 platos)</p>
            <ul>
                <li><label><input type="checkbox" id="sopa" onclick="seleccion(0);">Sopa</label></li>
                <li><label><input type="checkbox" id="caldo" onclick="seleccion(1);">Caldo</label></li>
                <li><label><input type="checkbox" id="carne" onclick="seleccion(2);">Carne</label></li>
                <li><label><input type="checkbox" id="pescado" onclick="seleccion(3);">Pescado</label></li>
                <li><label><input type="checkbox" id="tarta" onclick="seleccion(4);">Tarta</label></li>
                <li><label><input type="checkbox" id="helado" onclick="seleccion(5);">Helado</label></li>
            </ul>
        </div>
        <div id="resultado"></div>
    </section>







    <script src="restauranteAlaCarta.js"></script>

</html>
