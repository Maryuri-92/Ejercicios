<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda Online</title>
    <link rel="stylesheet" href="tiendaonline.css">
</head>

<body background="MULTIMEDIA/restaurante.jpg">
    <header>
        <h1>Tienda Online</h1>
    </header>
    <div id="contenedor">
        <section id="seccion1">
            <div id="producto1">
                <img src="MULTIMEDIA/HAMBURGUESA.jpg" alt="hamburguesa">
                <div>
                    <h3>Producto 1</h3>
                    <p> Precio: <span>11.50</span>€</p>
                </div>
                <input type="button" value="Añadir al Carrito" onclick="carritoDeProductos('producto1');">
            </div>
            <div>
                <img src="MULTIMEDIA/PASTA.jpg" alt="pasta">
                <div id="producto2">
                    <h3>Producto 2</h3>
                    <p class="precio">Precio: <span>14.80</span>€</p>
                </div>
                <input type="button" value="Añadir al Carrito" onclick="carritoDeProductos(`producto2`);">
            </div>
            <div>
                <img src="MULTIMEDIA/PIZZA.jpg" alt="pizza">
                <div id="producto3">
                    <h3>Producto 3</h3>
                    <p class="precio">Precio: <span>9.50</span>€</p>
                </div>
                <input type="button" value="Añadir al Carrito" onclick="carritoDeProductos(`producto3`);">
            </div>
            <div id="producto4">
                <img src="MULTIMEDIA/CARNE.jpg" alt="carne">
                <div>
                    <h3>Producto 4</h3>
                    <p class="precio">Precio:<span>18</span>€</p>
                </div>
                <input type="button" value="Añadir al Carrito" onclick="carritoDeProductos(`producto4`);">
            </div>
        </section>
        <section id="seccion2">
            <div id="carrito">
                <h2>Carrito 🛒 </h2>
                <div id="resultado"></div>
                <ul id="listaResultado"></ul>
            </div>
        </section>
    </div>
    <script src="tiendaonline.js"></script>
</body>

</html>
