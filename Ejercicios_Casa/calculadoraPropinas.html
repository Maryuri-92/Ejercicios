<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Propinas</title>
    <link rel="stylesheet" href="calculadoraPropinas.css">
</head>
<body>

    <main class="contenedor">
        <h1>Calculadora de Propinas</h1>
        
        <form id="formulario-propina">
            <div class="grupo-control">
                <label for="total-cuenta">Total de la cuenta (€):</label>
                <input type="number" id="total-cuenta" min="1" step="0.01" required placeholder="Ej: 50.50">
            </div>

            <div class="grupo-control">
                <label for="porcentaje-propina">¿Qué tal estuvo el servicio?</label>
                <select id="porcentaje-propina" required>
                    <option value="" disabled selected>Selecciona una opción</option>
                    <option value="0.05">Regular - 5%</option>
                    <option value="0.10">Bueno - 10%</option>
                    <option value="0.15">Excelente - 15%</option>
                </select>
            </div>

            <div class="grupo-control">
                <label for="numero-personas">¿Cuántas personas pagan?</label>
                <input type="number" id="numero-personas" min="1" step="1" required placeholder="Ej: 2">
            </div>

            <button type="submit" id="btn-calcular">Calcular Total</button>
        </form>

        <section id="zona-resultado" class="oculto">
            <h2>Resultado:</h2>
            <p>Propina total: <span id="resultado-propina">0.00</span>€</p>
            <p>Total por persona (con propina): <strong id="resultado-persona">0.00</strong>€</p>
        </section>
    </main>

    <script src="calculadoraPropinas.js"></script>
</body>
</html>
