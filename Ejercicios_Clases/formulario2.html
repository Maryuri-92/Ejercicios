<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Selecciona tu menu</title>
    <style>
        .seccionComida {
            border: solid 2px red;
            margin: 10px;
            padding: 15px;
        }

        .seccionComida ul {
            list-style-type: none;
        }

        #secciondeDatos {
            text-align: center;
        }

        #hacerReserva {
            text-align: center;
            padding-top: 15px;
        }
    </style>
</head>

<body>
    <header>
        <h1>Selecciona tu menu</h1>
    </header>
    <form>
        <section id="seccionPrimerPlato" class="seccionComida">
            <h2>Primer plato</h2>
            <ul>
                <li><input type="radio" name="primerplato" value="Sopa">Sopa</li>
                <li><input type="radio" name="primerplato" value="Caldo">Caldo </li>
                <li><input type="radio" name="primerplato" value="consome">Consome</li>
            </ul>
        </section>
        <section id="seccionSegundoPlato" class="seccionComida">
            <h2>Segundo Plato</h2>
            <ul>
                <li><input type="radio" name="segundoPlato" value="Carne">Carne</li>
                <li><input type="radio" name="segundoPlato" value="Pescado">Pescado</li>
                <li><input type="radio" name="segundoPlato" value="Pasta">Pasta</li>
            </ul>
        </section>
        <section id="secciondePostre" class="seccionComida">
            <h2>Postre</h2>
            <ul>
                <li><input type="radio" name="postre" value="Flan">Flan</li>
                <li><input type="radio" name="postre" value="Tarta">Tarta</li>
                <li><input type="radio" name="postre" value="Yogur">Yogur</li>
            </ul>
        </section>
        <footer id="secciondeDatos">
            Nombre:<input type="text" name="nombrecliente" required>
            Direccion:<input type="text" name="Direccion">
            Forma de pago
            <select name="formadepago">
                <option value="Transferencia">Transferencia</option>
                <option value="Bizum">Bizum</option>
                <option value="Tarjetadecredito">Tarjeta de credito</option>
                <option value="Efectivo">Efectivo</option>
            </select>
            <p id="hacerReserva">
                <input type="submit" value="Hacer Reserva">
            </p>
        </footer>
    </form>
</body>

</html>
