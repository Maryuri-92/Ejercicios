<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<title>Carrusel de imágenes</title>
		<link type="text/css" rel="stylesheet" href="carrusel.css"/>
	</head>
	<body>
		<header>
			<h1>Castillos de Europa</h1>
		</header>
		<main id="carrusel" class="contenedorCarrusel">
			<figure class="contenedorIzq">
				<img id="imagenIzq" src="imagenes/beloeil.jpg" alt=""/>
				<figcaption id="captionIzq">Castillo de Beloeil</figcaption>
			</figure>
			<figure class="contenedorCentro">
				<img id="imagenCentro" src="imagenes/cardona.jpg" alt=""/>
				<figcaption id="captionCentro">Castillo de Cardona</figcaption>
			</figure>
			<figure class="contenedorDer">
				<img id="imagenDer" src="imagenes/chambord.jpg" alt=""/>
				<figcaption id="captionDer">Castillo de Chambord</figcaption>
			</figure>
		</main>
		<section class="contenedorVelocidad">
			<div><input type="button" value="-" onclick="cambiarVelocidad(-1);"/> <input type="range" id="rngVelocidad" min="0" max="5" oninput="moverCarruselVelocidad();"/> <input type="button" value="+" onclick="cambiarVelocidad(1);"/></div>
			<label for="rngVelocidad">Velocidad: <span id="spanVelocidad">1 imagen cada 3 seg.</span></label>
		</section>
		
		<script src="carrusel.js"></script>
	</body>
</html>
