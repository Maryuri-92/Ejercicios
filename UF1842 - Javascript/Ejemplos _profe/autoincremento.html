<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Document</title>
</head>
<body>
    
    <input type="number" id="txtNumero">
    <input type="button" value="++valor" onclick="incrementoDelante();">
    <input type="button" value="valor++" onclick="incrementoDetras();">
    <input type="button" value="--valor" onclick="decrementoDelante();">
    <input type="button" value="valor--" onclick="decrementoDetras();">
    <div id="divResultado"></div>

    <script src="autoincremento.js"></script>
</body>
</html>
