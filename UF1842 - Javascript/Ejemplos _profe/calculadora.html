<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Document</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oxanium:wght@200..800&display=swap');
        * {
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
        }
        .contenedorGrid {
            display: grid;
            grid-template-columns: repeat(4, auto);
            width: 300px;
            height: 400px;
            border: solid 4px purple;
            gap: 10px;
            padding: 5px;
        }
        #pantalla {
            grid-column: span 4;
            text-align: right;
            font-size: 28pt;
            font-family: "Oxanium", sans-serif;
            padding: 0 5px;
        }
        .botonDoble {
            grid-column: span 2;
        }
        .contenedorGrid input {
            font-size: 24pt;
            width: 100%;
        }
        [type="button"] {
            border-radius: 15px;
            box-shadow: 3px 3px purple;
        }
        [type="button"]:hover {
            background-color: rgb(117, 132, 91);
            cursor: pointer;
        }
        [type="button"]:active {
            box-shadow: none;
            transform: scale(0.9);
        }
    </style>
</head>
<body>
    <main class="contenedorGrid">
        <input id="pantalla" type="text" value="0" readonly>

        <input type="button" value="CE" class="botonDoble" onclick="pulsarCE();">
        <input type="button" value="C" onclick="pulsarC();">
        <input type="button" value="&#129044;" onclick="pulsarBorrarUltimo();">
        <input type="button" value="7" onclick="pulsarNumero(7);">
        <input type="button" value="8" onclick="pulsarNumero(8);">
        <input type="button" value="9" onclick="pulsarNumero(9);">
        <input type="button" value="+" onclick="pulsarOperacion('+')">
        <input type="button" value="4" onclick="pulsarNumero(4);">
        <input type="button" value="5" onclick="pulsarNumero(5);">
        <input type="button" value="6" onclick="pulsarNumero(6);">
        <input type="button" value="-" onclick="pulsarOperacion('-')">
        <input type="button" value="1" onclick="pulsarNumero(1);">
        <input type="button" value="2" onclick="pulsarNumero(2);">
        <input type="button" value="3" onclick="pulsarNumero(3);">
        <input type="button" value="X" onclick="pulsarOperacion('*')">
        <input type="button" value="0" onclick="pulsarNumero(0);">
        <input type="button" value="=" class="botonDoble" onclick="pulsarIgual();">
        <input type="button" value="/" onclick="pulsarOperacion('/')">
    </main>

    <script src="calculadora.js"></script>
</body>
</html>
