<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Calculadora v1</title>
    <style>
        body {
            font-size: 3rem;
            font-family: Verdana, Geneva, Tahoma, sans-serif
        }
        main {
            width: 60%;
            margin: auto;
            display: grid;
            grid-template-columns: 2fr 1fr;
        }
        div {
            padding: 20px;
            text-align: center;
        }
        input {
            font: inherit;
        }
        input[type="text"] {
            text-align: right;
            background-color: rgb(215, 222, 228);
        }
        .operaciones {
            display: grid;
            grid-template-columns: 70px 70px;
            gap: 10px;
        }
        input[type="button"] {
            border-radius: 50%;
        }
        .resultado {
            border-top: solid 2px black;
        }
    </style>
</head>
<body>
    <main>
        <div class="numeros">
            <input type="text" id="txtPrimerNumero">
            <input type="text" id="txtSegundoNumero">
        </div>
        <div class="operaciones">
            <input type="button" value="+" onclick="sumar();">
            <input type="button" value="-" onclick="restar();">
            <input type="button" value="X" onclick="multiplicar();">
            <input type="button" value="/" onclick="dividir();">
        </div>
        <div class="resultado">
            <input type="text" id="txtResultado" readonly>
        </div>
    </main>

    <script src="calculadora1.js"></script>
</body>
</html>
