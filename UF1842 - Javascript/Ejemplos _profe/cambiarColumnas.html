<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cambiar número de columnas</title>
    <style>
        body {
            display: flex;
            background-color: bisque;
        }
        .lista {
            list-style-type: none;
            font-family: Verdana, Geneva, Tahoma, sans-serif;
            font-size: 2rem;
        }
        .lista li {
            margin: 20px 0;
        }
        [type="radio"] {
            width: 30px;
            height: 30px;
        }
        #imagenes {
            display: grid;
        }
        .unaColumna {
            grid-template-columns: 1fr;
        }
        .dosColumnas {
            grid-template-columns: 1fr 1fr;
        }
        .tresColumnas {
            grid-template-columns: 1fr 1fr 1fr;
        }   
        #imagenes img {
            width: 150px;
        }
    </style>
</head>
<body>

    <fieldset>
        <legend>Elegir el número de columnas:</legend>
        <ul class="lista">
            <li><label><input type="radio" checked name="numeroColumnas" value="unaColumna" id="rdUnaColumna" onclick="unaColumna();">Una columna</label></li>
            <li><label><input type="radio" name="numeroColumnas" value="dosColumnas" id="rdDosColumnas" onclick="dosColumnas();">Dos columnas</label></li>
            <li><label></label><input type="radio" name="numeroColumnas" value="tresColumnas" id="rdTresColumnas" onclick="tresColumnas();">Tres columnas</label></li>
        </ul>
    </fieldset>

    <section id="imagenes" class="unaColumna">
        <img src="imagenes/uno.png" alt="Número uno">
        <img src="imagenes/dos.png" alt="Número dos">
        <img src="imagenes/tres.png" alt="Número tres">
        <img src="imagenes/cuatro.png" alt="Número cuatro">
        <img src="imagenes/cinco.png" alt="Número cinco">
        <img src="imagenes/seis.png" alt="Número seis">
    </section>
    
    <script src="cambiarColumnas.js"></script>
</body>
</html>
